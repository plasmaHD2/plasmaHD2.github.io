<!DOCTYPE html>
<html lang="en">
    <head></head>

    <link rel="stylesheet" type="text/css" href="styles.css">

    <body>
        <!--SIDEBAR-->
        <div id="sidebar">
            <div id = "headerbox">
                <h1 id="usernamedisplay"></h1>
            </div>
            <div>
                <div>
                    <h2>Bio:</h1>
                    <p id="Bio"></p>
                </div>
            </div>
            
            <a class="LinkToGithub"><img id = "github-profile" src="https://github.com"></a>

            <div>
                <div>
                    <h2>Interests:</h2>
                    <ul>
                        <li>Coding</li>
                        <li>Math</li>
                        <li>Video Games</li>
                    </ul>
                </div>
            </div>

            </div>
        </div>

        <!--PAGE-->
        <div id = "page">
            <div>
                <div id = "spacer"></div>
                <div>
                    <h1>Coding Experience:</h1>
                </div>
                <div id = "spacer"></div>
                <div class="Slideshow">
                    <button id="Backwards" class="scrollbtn"><</button>
                    <img id="imageslideBefore">
                    <figure>
                        <img id="imageslide">
                        <figcaption id="imagedescription"></figcaption>
                    </figure>
                    <img id="imageslideAfter">
                    <button id="Forwards" class="scrollbtn">></button>
                </div>
            </div>
            <div id = "spacer"></div>
            <div>
                <h1>Github Repos:</h1>
            </div>
            <div id = "spacer"></div>
            <div id = "Repo"></div>
        </div>
    <script>

    async function getGithubProfile(){
        const username = "plasmaHD2"
        const apiUrl = `https://api.github.com/users/${username}`;

        try {
            const response = await fetch(apiUrl);
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            const data = await response.json();
            document.getElementById('Bio').textContent = data.bio || "Nothing yet";
            document.getElementById('github-profile').src = data.avatar_url;
            document.getElementById('github-profile').alt = username;
            const nodes = document.getElementsByClassName('LinkToGithub');
            for (let i = 0; i < nodes.length; i++) {
                nodes[i].href = `https://github.com/${username}`;
            }
            document.getElementById('usernamedisplay').textContent = username;
            const repoResponse = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=3`);
            const repos = await repoResponse.json();
            const repoContainer = document.getElementById('Repo');
            repoContainer.innerHTML = repos.map(repo => `
            <li>
                <div>
                    <a href="${repo.html_url}"><b>${repo.name}</b></a>
                </div>
            </li>
            `).join('') || "<p>Nothing yet :(</p>";
        }    
        catch (error) {
            console.error('Error fetching GitHub profile:', error);
        }
    }
    getGithubProfile();

    </script>
